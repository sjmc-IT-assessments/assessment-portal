<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gr9 Digital Technology — Term 2 2026 | St Joseph's Marist College</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --blue-dark:   #1F4E79;
    --blue-mid:    #2E75B6;
    --blue-light:  #D6E4F0;
    --green:       #1a7a4a;
    --green-light: #e8f5ee;
    --red:         #c0392b;
    --red-light:   #fdecea;
    --amber:       #d97706;
    --grey-900:    #1a1a2e;
    --grey-100:    #f4f6f9;
    --grey-50:     #f9fafb;
    --white:       #ffffff;
    --border:      #dde3ee;
    --mono:        'JetBrains Mono', monospace;
    --sans:        'DM Sans', sans-serif;
    --tabs-h:      44px;
    --status-h:    32px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--sans);
    background: var(--grey-100);
    color: var(--grey-900);
  }

  /* ── TAB BAR ──────────────────────────────────────────────────────── */
  #tab-bar {
    height: var(--tabs-h);
    background: white;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: #777;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.01em;
  }

  .tab-btn:hover { color: var(--blue-mid); }

  .tab-btn.active {
    color: var(--blue-dark);
    border-bottom-color: var(--blue-dark);
    background: var(--grey-50);
  }

  .tab-btn .tab-icon { font-size: 15px; }

  /* ── PANELS ───────────────────────────────────────────────────────── */
  #panels {
    height: calc(100vh - var(--tabs-h) - var(--status-h));
    position: relative;
  }

  .panel {
    position: absolute;
    inset: 0;
    display: none;
  }

  .panel.active { display: flex; flex-direction: column; }

  /* ── PAPER PANEL ──────────────────────────────────────────────────── */
  #panel-paper {
    background: #e8eaed;
  }

  /* ── ZOOM BAR ─────────────────────────────────────────────────────── */
  #zoom-bar {
    height: 30px;
    background: var(--grey-50);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 2px;
    flex-shrink: 0;
  }

  .zoom-btn {
    height: 22px;
    min-width: 26px;
    padding: 0 8px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 700;
    color: #555;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, border-color 0.1s;
    line-height: 1;
  }

  .zoom-btn:hover  { background: var(--blue-light); border-color: var(--border); color: var(--blue-dark); }
  .zoom-btn.active { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-dark); }

  #zoom-label {
    font-size: 11px;
    font-weight: 700;
    color: #777;
    min-width: 36px;
    text-align: center;
    font-family: var(--mono);
    user-select: none;
  }

  .zoom-sep { width: 1px; height: 16px; background: var(--border); margin: 0 4px; }

  /* ── PAPER SCROLL ─────────────────────────────────────────────────── */
  #paper-scroll {
    flex: 1;
    overflow: auto;
    background: #e8eaed;
  }

  #paper-frame {
    border: none;
    display: block;
  }

  /* ── EDITOR PANEL ─────────────────────────────────────────────────── */
  #panel-editor {
    flex-direction: row;
  }

  /* Learner info bar */
  #info-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40px;
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    z-index: 5;
    flex-shrink: 0;
  }

  #info-bar label {
    font-size: 11px; font-weight: 700;
    color: var(--blue-dark);
    text-transform: uppercase; letter-spacing: 0.05em;
    white-space: nowrap;
  }

  #info-bar input {
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 9px;
    font-size: 12px;
    font-family: var(--sans);
    background: var(--grey-50);
    outline: none;
    transition: border-color 0.15s;
  }

  #info-bar input:focus { border-color: var(--blue-mid); background: white; }
  #name-input  { width: 180px; }
  #class-input { width: 80px; }

  .info-divider { width: 1px; height: 20px; background: var(--border); }

  .info-stats {
    margin-left: auto;
    display: flex; gap: 14px; align-items: center;
  }

  .stat-chip { font-size: 11px; color: #777; font-weight: 500; }
  .stat-chip span { font-weight: 700; color: var(--blue-dark); }

  /* Editor / preview split */
  #editor-wrap {
    position: absolute;
    top: 40px; left: 0; right: 0; bottom: 0;
    display: flex;
  }

  /* ── CODE EDITOR ──────────────────────────────────────────────────── */
  #editor-pane {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 2px solid var(--border);
    background: #1e1e2e;
  }

  #editor-titlebar {
    height: 32px;
    background: #16162a;
    display: flex; align-items: center;
    padding: 0 12px; gap: 7px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-a { background: #febc2e; }
  .dot-g { background: #28c840; }

  .filename { font-size: 11px; color: rgba(255,255,255,0.4); font-family: var(--mono); margin-left: 4px; }

  #code-editor {
    flex: 1;
    width: 100%; resize: none; border: none; outline: none;
    padding: 14px;
    font-family: var(--mono);
    font-size: 13px; line-height: 1.7;
    background: #1e1e2e; color: #cdd6f4;
    caret-color: #89b4fa;
    tab-size: 2;
    white-space: pre;
    overflow-wrap: normal;
    overflow-x: auto; overflow-y: auto;
  }

  #code-editor::selection { background: rgba(137,180,250,0.3); }

  #code-editor::placeholder {
    color: rgba(205,214,244,0.2); font-style: italic;
  }

  /* ── PREVIEW PANE ─────────────────────────────────────────────────── */
  #preview-pane {
    width: 50%;
    display: flex; flex-direction: column;
    background: white;
  }

  #preview-titlebar {
    height: 32px;
    background: var(--grey-50);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    flex-shrink: 0;
  }

  .preview-label {
    font-size: 11px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  .live-badge {
    margin-left: auto;
    background: var(--green-light); color: var(--green);
    font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  #preview-frame { flex: 1; border: none; width: 100%; background: white; }

  /* ── STATUS BAR ───────────────────────────────────────────────────── */
  #status-bar {
    height: var(--status-h);
    background: var(--blue-dark);
    display: flex; align-items: center;
    padding: 0 14px; gap: 14px;
    flex-shrink: 0;
  }

  #autosave-indicator {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 5px;
    color: rgba(255,255,255,0.4);
    transition: color 0.3s;
  }

  #autosave-indicator.saved { color: #a6e3a1; }

  .dot-indicator {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }

  #status-bar .status-right {
    margin-left: auto;
    display: flex; gap: 14px; align-items: center;
  }

  .status-stat { font-size: 10px; color: rgba(255,255,255,0.4); font-family: var(--mono); }
  .status-stat span { color: rgba(255,255,255,0.8); font-weight: 600; }

  /* ── SUBMIT BUTTON ────────────────────────────────────────────────── */
  #submit-btn {
    height: 26px; padding: 0 16px;
    background: var(--green); color: white;
    border: none; border-radius: 4px;
    font-size: 11px; font-weight: 700;
    font-family: var(--sans);
    letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  #submit-btn:hover  { background: #156a3e; }
  #submit-btn:active { transform: scale(0.97); }
  #submit-btn:disabled { background: #888; cursor: not-allowed; transform: none; }

  /* ── MODAL ────────────────────────────────────────────────────────── */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: center; justify-content: center;
  }

  #modal-overlay.visible { display: flex; }

  #modal {
    background: white; border-radius: 12px;
    padding: 30px; max-width: 420px; width: 90%;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    text-align: center;
  }

  #modal .modal-icon { font-size: 38px; margin-bottom: 14px; }
  #modal h2 { font-size: 19px; font-weight: 700; color: var(--blue-dark); margin-bottom: 10px; }
  #modal p  { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 22px; }
  #modal p strong { color: var(--grey-900); }

  .modal-actions { display: flex; gap: 10px; justify-content: center; }

  .modal-btn {
    height: 36px; padding: 0 22px;
    border-radius: 6px; font-size: 12px; font-weight: 700;
    font-family: var(--sans); cursor: pointer; border: none;
    transition: opacity 0.15s;
  }

  .modal-btn:hover { opacity: 0.85; }
  .modal-btn.confirm { background: var(--green); color: white; }
  .modal-btn.cancel  { background: var(--grey-100); color: var(--grey-900); border: 1px solid var(--border); }

  /* ── SUCCESS ──────────────────────────────────────────────────────── */
  #success-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--green); z-index: 200;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }

  #success-overlay.visible { display: flex; }
  #success-overlay .si { font-size: 64px; }
  #success-overlay h1  { font-size: 28px; color: white; font-weight: 700; }
  #success-overlay p   { font-size: 15px; color: rgba(255,255,255,0.85); text-align: center; max-width: 380px; line-height: 1.6; }

  /* ── ERROR BANNER ─────────────────────────────────────────────────── */
  #error-banner {
    display: none;
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--red); color: white;
    padding: 9px 18px; border-radius: 7px;
    font-size: 12px; font-weight: 600;
    z-index: 300; box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    max-width: 440px; text-align: center;
  }

  #error-banner.visible { display: block; }
</style>
</head>
<body>

<!-- ── TAB BAR ─────────────────────────────────────────────────────────── -->
<div id="tab-bar">
  <button class="tab-btn active" id="tab-paper" onclick="switchTab('paper')">
    <span class="tab-icon">📄</span> Section A — Question Paper
  </button>
  <button class="tab-btn" id="tab-editor" onclick="switchTab('editor')">
    <span class="tab-icon">💻</span> Section B — HTML Practical
  </button>
</div>

<!-- ── PANELS ──────────────────────────────────────────────────────────── -->
<div id="panels">

  <!-- PAPER PANEL -->
  <div class="panel active" id="panel-paper">
    <div id="zoom-bar">
      <button class="zoom-btn" id="fit-btn" onclick="toggleFit()" title="Fit to screen">⊡ Fit</button>
      <div class="zoom-sep"></div>
      <button class="zoom-btn" onclick="zoomStep(-1)" title="Zoom out">−</button>
      <span id="zoom-label">125%</span>
      <button class="zoom-btn" onclick="zoomStep(1)" title="Zoom in">+</button>
    </div>
    <div id="paper-scroll">
      <iframe
        id="paper-frame"
        src="https://docs.google.com/document/d/1k6qqdmQHQ8cV0zKWlmxYQ3UVXsZnXXiYCtuaidJq1KU/preview"
        allow="autoplay"
        loading="lazy">
      </iframe>
    </div>
  </div>

  <!-- EDITOR PANEL -->
  <div class="panel" id="panel-editor">

    <!-- Learner info bar -->
    <div id="info-bar">
      <label for="name-input">Name</label>
      <input id="name-input" type="text" placeholder="Full name" autocomplete="off" spellcheck="false">
      <div class="info-divider"></div>
      <label for="class-input">Class</label>
      <input id="class-input" type="text" placeholder="e.g. 9AC" maxlength="6" autocomplete="off" spellcheck="false">
      <div class="info-divider"></div>
      <button id="submit-btn" onclick="openModal()">Submit Work ↑</button>
      <div class="info-stats">
        <div class="stat-chip">Lines: <span id="line-count">1</span></div>
        <div class="stat-chip">Chars: <span id="char-count">0</span></div>
      </div>
    </div>

    <!-- Editor + preview split -->
    <div id="editor-wrap">

      <!-- Code editor -->
      <div id="editor-pane">
        <div id="editor-titlebar">
          <div class="dot dot-r"></div>
          <div class="dot dot-a"></div>
          <div class="dot dot-g"></div>
          <div class="filename">index.html</div>
        </div>
        <textarea
          id="code-editor"
          placeholder="<!-- Start typing your HTML here... -->"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>

      <!-- Live preview -->
      <div id="preview-pane">
        <div id="preview-titlebar">
          <div class="preview-label">Live Preview</div>
          <div class="live-badge">● Live</div>
        </div>
        <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
      </div>

    </div>
  </div>

</div>

<!-- ── STATUS BAR ──────────────────────────────────────────────────────── -->
<div id="status-bar">
  <div id="autosave-indicator">
    <div class="dot-indicator"></div>
    <span id="autosave-text">Unsaved</span>
  </div>
  <div class="status-right">
    <div class="status-stat">UTF-8</div>
    <div class="status-stat">HTML</div>
  </div>
</div>

<!-- ── CONFIRM MODAL ───────────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-icon">📤</div>
    <h2>Submit your work?</h2>
    <p>Your code will be submitted as <strong id="modal-name">—</strong> in class <strong id="modal-class">—</strong>.<br><br>Make sure you are happy with your work before submitting. <strong>You cannot resubmit.</strong></p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Go Back</button>
      <button class="modal-btn confirm" onclick="submitWork()">Yes, Submit</button>
    </div>
  </div>
</div>

<!-- ── SUCCESS ─────────────────────────────────────────────────────────── -->
<div id="success-overlay">
  <div class="si">✅</div>
  <h1>Submitted!</h1>
  <p id="success-msg">Your work has been received. You may now close this tab.</p>
</div>

<!-- ── ERROR BANNER ────────────────────────────────────────────────────── -->
<div id="error-banner"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSdkZ1s13_bhMYOvhiucN5mpojiwmbIw0lMmAy8TbwFldhTWvg/formResponse';
const ENTRY_NAME  = 'entry.768851624';
const ENTRY_CLASS = 'entry.1826817692';
const ENTRY_CODE  = 'entry.1284137962';
const LS_KEY      = 'sjmc_gr9_dt_t2_2026';

// ── PAPER ZOOM ────────────────────────────────────────────────────────────
let paperZoom = 1.25;
let fitMode   = false;
const ZOOM_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0];

function applyPaperZoom() {
  const scroll = document.getElementById('paper-scroll');
  const pframe = document.getElementById('paper-frame');
  const label  = document.getElementById('zoom-label');
  const fitBtn = document.getElementById('fit-btn');
  const w = scroll.clientWidth;
  const h = scroll.clientHeight;
  if (!w) return;

  if (fitMode) {
    pframe.style.width  = '100%';
    pframe.style.height = h + 'px';
    pframe.style.zoom   = '';
    label.textContent   = 'Fit';
    fitBtn.classList.add('active');
  } else {
    pframe.style.width  = w + 'px';
    pframe.style.height = h + 'px';
    pframe.style.zoom   = paperZoom;
    label.textContent   = Math.round(paperZoom * 100) + '%';
    fitBtn.classList.remove('active');
  }
}

function toggleFit() {
  fitMode = !fitMode;
  applyPaperZoom();
}

function zoomStep(dir) {
  fitMode = false;
  let idx = ZOOM_STEPS.findIndex(z => Math.abs(z - paperZoom) < 0.01);
  if (idx === -1) idx = ZOOM_STEPS.indexOf(1.25);
  const newIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, idx + dir));
  paperZoom = ZOOM_STEPS[newIdx];
  applyPaperZoom();
}

window.addEventListener('resize', () => {
  if (document.getElementById('panel-paper').classList.contains('active')) applyPaperZoom();
});

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'paper') applyPaperZoom();
}

// ── ELEMENTS ──────────────────────────────────────────────────────────────
const editor      = document.getElementById('code-editor');
const frame       = document.getElementById('preview-frame');
const lineCountEl = document.getElementById('line-count');
const charCountEl = document.getElementById('char-count');
const autosaveEl  = document.getElementById('autosave-indicator');
const autosaveText= document.getElementById('autosave-text');
const nameInput   = document.getElementById('name-input');
const classInput  = document.getElementById('class-input');

// ── TAB KEY ───────────────────────────────────────────────────────────────
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    const v = editor.value;
    editor.value = v.substring(0, s) + '  ' + v.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    triggerUpdate();
  }
});

// ── PREVIEW UPDATE ────────────────────────────────────────────────────────
let previewTimer = null;

function triggerUpdate() {
  updateStats();
  markUnsaved();
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 400);
}

function updatePreview() {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open(); doc.write(editor.value); doc.close();
  } catch(e) {}
}

function updateStats() {
  const val = editor.value;
  lineCountEl.textContent = val === '' ? 1 : val.split('\n').length;
  charCountEl.textContent = val.length;
}

editor.addEventListener('input', triggerUpdate);

// ── AUTOSAVE ──────────────────────────────────────────────────────────────
let saveTimer = null;
let submitted = false;

function markUnsaved() {
  autosaveEl.classList.remove('saved');
  autosaveText.textContent = 'Unsaved';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1500);
}

function doSave() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      code:  editor.value,
      name:  nameInput.value,
      class: classInput.value,
      ts:    Date.now()
    }));
  } catch(e) {}
  autosaveEl.classList.add('saved');
  autosaveText.textContent = 'Draft saved';
}

// Aggressive restore — runs immediately on page load
(function restoreOnLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.code)  { editor.value      = data.code;  triggerUpdate(); }
    if (data.name)  { nameInput.value   = data.name;  }
    if (data.class) { classInput.value  = data.class; }
    if (data.code || data.name) {
      autosaveEl.classList.add('saved');
      autosaveText.textContent = 'Draft restored';
    }
  } catch(e) {}
})();

// Save name/class changes too
nameInput.addEventListener('input',  () => { clearTimeout(saveTimer); saveTimer = setTimeout(doSave, 1000); });
classInput.addEventListener('input', () => { clearTimeout(saveTimer); saveTimer = setTimeout(doSave, 1000); });

// Save immediately when switching to paper tab (belt and braces)
document.getElementById('tab-paper').addEventListener('click', doSave);

// ── PREVENT ACCIDENTAL CLOSE ──────────────────────────────────────────────
window.addEventListener('beforeunload', (e) => {
  doSave(); // save synchronously before unload
  if (!submitted && editor.value.trim().length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// Also save on visibility change (e.g. Chromebook sleep / tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') doSave();
});

// ── VALIDATION ────────────────────────────────────────────────────────────
function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg;
  b.classList.add('visible');
  setTimeout(() => b.classList.remove('visible'), 4000);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal() {
  const name = nameInput.value.trim();
  const cls  = classInput.value.trim();
  const code = editor.value.trim();

  // Switch to editor tab first so they can see what they're submitting
  switchTab('editor');

  if (!name) { showError('⚠️  Please enter your full name before submitting.'); return; }
  if (!cls)  { showError('⚠️  Please enter your class before submitting.');     return; }
  if (!code) { showError('⚠️  Your code is empty — nothing to submit.');        return; }
  if (code.length < 50) {
    showError('⚠️  Your code looks too short. Make sure you have written your HTML.');
    return;
  }

  document.getElementById('modal-name').textContent  = name;
  document.getElementById('modal-class').textContent = cls;
  document.getElementById('modal-overlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

// ── SUBMIT ────────────────────────────────────────────────────────────────
function submitWork() {
  if (submitted) return;

  const name = nameInput.value.trim();
  const cls  = classInput.value.trim();
  const code = editor.value;

  closeModal();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-btn').textContent = 'Submitting…';

  const body = new URLSearchParams();
  body.append(ENTRY_NAME,  name);
  body.append(ENTRY_CLASS, cls);
  body.append(ENTRY_CODE,  code);

  fetch(FORM_ACTION, {
    method: 'POST',
    mode:   'no-cors',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body:   body.toString()
  })
  .then(() => { submitted = true; clearSaved(); showSuccess(name, cls); })
  .catch(() => { submitted = true; clearSaved(); showSuccess(name, cls); });
}

function clearSaved() {
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
}

function showSuccess(name, cls) {
  document.getElementById('success-msg').textContent =
    `${name} (${cls}) — your work has been received by your teacher. You may now close this tab.`;
  document.getElementById('success-overlay').classList.add('visible');
}

// Initialise paper zoom once layout is ready
requestAnimationFrame(applyPaperZoom);
</script>
</body>
</html>
