<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJMC Assessment Viewer</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            flex-wrap: wrap;
            box-sizing: border-box;
            width: 100%;
        }

        .header-right {
            margin-left: auto;
            padding-right: 10px;
        }

        .fullscreen-btn {
            margin-left: 10px;
            min-width: 90px;
            white-space: nowrap;
            margin-right: 10px;
            padding: 8px 10px;

        }

        @media (max-width: 480px) {
            .header {
                gap: 8px;
                padding: 8px;
                /* Smaller padding on small screens */
            }

            .header-title {
                font-size: 1.1rem;
            }

            .fullscreen-btn {
                min-width: 70px;
                /* Smaller min-width on small screens */
                padding: 6px 8px;
                font-size: 0.9rem;
            }

            #assessmentTitle {
                font-size: 0.95rem;
            }
        }

        .content {
            height: calc(100% - 60px);
            position: relative;
        }

        .back-btn,
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #proxyFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            z-index: -1;
        }

        #displayFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        .header-center {
            text-align: center;
            flex-grow: 1;
        }

        #assessmentTitle {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
        }

        #gradeSubject {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #assessmentDate,
        #assessmentType {
            font-size: 0.9rem;
            font-weight: normal;
        }

    </style>
</head>

<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn">Back</button>
        </div>
        <div class="header-center">
            <h2 id="assessmentTitle">
                <span id="gradeSubject">Grade 10 - Natural Science</span>
                <span id="assessmentDate">Monday 10/March/25</span>
                <span id="assessmentType">Test</span>
            </h2>
        </div>
        <div class="header-right">
            <button class="fullscreen-btn" id="fullscreenBtn">Full</button>
        </div>
    </div>

    <div class="content">
        <!-- The proxy frame loads the Google Drive URL but isn't directly visible -->
        <iframe id="proxyFrame" src="about:blank"></iframe>

        <!-- This frame displays the content from the proxy frame -->
        <iframe id="displayFrame" src="about:blank"></iframe>
    </div>

    <script src="assets/js/viewer.js"></script>
</body>

</html>
