<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJMC Assessment Viewer</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            flex-wrap: wrap;
            box-sizing: border-box;
            width: 100%;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            padding-right: 10px;
        }

        @media (max-width: 480px) {
            .header { gap: 8px; padding: 8px; }
            #assessmentTitle { font-size: 0.95rem; }
        }

        .content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #proxyFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            z-index: -1;
        }

        #displayFrame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        .header-center {
            text-align: center;
            flex-grow: 1;
        }

        #assessmentTitle {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.3;
        }

        #gradeSubject {
            font-size: 1.1rem;
            font-weight: 600;
        }

        #assessmentDate,
        #assessmentType {
            font-size: 0.9rem;
            font-weight: normal;
        }

        /* Exam Timer */
        .exam-timer {
            background: white;
            color: var(--primary-color, #0a2b72);
            border-radius: 6px;
            padding: 3px 10px;
            text-align: center;
            line-height: 1.25;
            min-width: 90px;
        }

        .exam-timer .timer-label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            opacity: 0.7;
        }

        .exam-timer .timer-time {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.03em;
        }

        .exam-timer.timer-clock .timer-time {
            font-size: 1rem;
            padding: 2px 0;
        }

        .exam-timer.timer-reading { color: #D97706; }
        .exam-timer.timer-warning { color: #D97706; }

        .exam-timer.timer-danger {
            color: #DC2626;
            animation: timerPulse 1s ease-in-out infinite;
        }

        .exam-timer.timer-done { color: #DC2626; }

        .exam-timer.timer-done .timer-label {
            font-size: 0.85rem;
            text-transform: none;
            letter-spacing: 0;
            opacity: 1;
            font-weight: 700;
        }

        @keyframes timerPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Broadcast Banner */
        .broadcast-banner {
            flex-shrink: 0;
            background: #FEF3C7;
            border-bottom: 2px solid #F59E0B;
            color: #92400E;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 10;
        }

        .broadcast-banner .broadcast-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Phase Transition Overlay */
        .phase-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            animation: overlayFadeIn 0.3s ease;
        }

        .phase-overlay-card {
            background: white;
            border-radius: 16px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: 90%;
            animation: overlaySlideUp 0.3s ease;
        }

        .phase-overlay-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        .phase-overlay-card h2 {
            color: #0a2b72;
            font-size: 1.8rem;
            margin: 0 0 10px;
        }

        .phase-overlay-card p {
            color: #4B5563;
            font-size: 1.1rem;
            margin: 0 0 24px;
        }

        .phase-overlay-countdown {
            color: #9CA3AF;
            font-size: 0.85rem;
            margin: 0;
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes overlaySlideUp {
            from { transform: translateY(24px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>

<body>
    <div class="header">
        <div class="header-left">
            <button class="back-btn" id="backBtn">Back</button>
        </div>
        <div class="header-center">
            <h2 id="assessmentTitle">
                <span id="gradeSubject">Grade 10 - Natural Science</span>
                <span id="assessmentDate">Monday 10/March/25</span>
                <span id="assessmentType">Test</span>
            </h2>
        </div>
        <div class="header-right">
            <div id="examTimer" class="exam-timer"></div>
        </div>
    </div>

    <!-- Teacher broadcast banner — hidden until a message is sent -->
    <div id="broadcastBanner" class="broadcast-banner" style="display:none">
        <span class="broadcast-icon">📢</span>
        <span id="broadcastMessage"></span>
    </div>

    <div class="content">
        <iframe id="proxyFrame" src="about:blank"></iframe>
        <iframe id="displayFrame" src="about:blank"></iframe>
    </div>

    <!-- Phase transition overlay — hidden until triggered -->
    <div id="phaseOverlay" class="phase-overlay" style="display:none">
        <div class="phase-overlay-card">
            <div class="phase-overlay-icon" id="overlayIcon"></div>
            <h2 id="overlayTitle"></h2>
            <p id="overlaySubtitle"></p>
            <p class="phase-overlay-countdown">Dismissing in <span id="overlayCountdown">5</span>s</p>
        </div>
    </div>

    <script type="module" src="assets/js/viewer.js"></script>
</body>

</html>
