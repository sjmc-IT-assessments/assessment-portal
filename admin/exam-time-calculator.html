<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exam Invigilation Time Board</title>
    <style>
      :root {
        --ink: #16201d;
        --muted: #63706c;
        --line: #dce5e0;
        --wash: #f3f7f4;
        --green: #1c6b4f;
        --green-dark: #114935;
        --teal: #0f766e;
        --red: #b42318;
        --shadow: 0 18px 42px rgba(20, 39, 32, 0.13);

        --reading-bg: #eff6ff; --reading-border: #93c5fd; --reading-fg: #1d4ed8;
        --start-bg:   #f0fdf4; --start-border:   #86efac; --start-fg:   #15803d;
        --halfway-bg: #fefce8; --halfway-border: #fde047; --halfway-fg: #854d0e;
        --warning-bg: #fff7ed; --warning-border: #fdba74; --warning-fg: #c2410c;
        --end-bg:     #fff1f2; --end-border:     #fda4af; --end-fg:     #be123c;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; }

      body {
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(233, 242, 236, 0.92), rgba(247, 249, 247, 0.98)),
          url("https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1800&q=80");
        background-attachment: fixed;
        background-position: center;
        background-size: cover;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }

      button, input { font: inherit; }
      button { cursor: pointer; }

      /* ── Shell ── */
      .shell {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 52px;
      }

      /* ── Topbar ── */
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        flex-shrink: 0;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        border: 1px solid rgba(28, 107, 79, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 4px 14px rgba(19, 71, 53, 0.08);
      }

      .brand-text h1 {
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.1;
      }

      .brand-text p {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 1px;
      }

      .session-fields {
        flex: 1 1 300px;
        display: flex;
        gap: 8px;
        min-width: 0;
      }

      .session-fields input {
        min-height: 40px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
        padding: 8px 12px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .session-fields input::placeholder { color: #8fa39c; }
      .session-fields input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
      }

      #sessionTitle { flex: 1 1 180px; min-width: 0; }
      #sessionDate  { flex: 0 0 148px; }

      .topbar-actions {
        display: flex;
        gap: 7px;
        flex-shrink: 0;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 38px;
        padding: 7px 13px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font-weight: 700;
        font-size: 0.87rem;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
        transition: background 0.13s, border-color 0.13s, color 0.13s;
      }

      .btn svg { flex-shrink: 0; width: 15px; height: 15px; }

      .btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
      .btn.primary:hover { background: var(--green-dark); border-color: var(--green-dark); }
      .btn.secondary { border-color: #c4d3cc; }
      .btn.secondary:hover { border-color: var(--teal); color: var(--teal); }
      .btn.ghost { color: var(--muted); }
      .btn.ghost:hover { background: #edf3ef; color: var(--ink); }
      .btn.danger { color: var(--red); border-color: #f0c9c5; }
      .btn.danger:hover { background: #fff0ef; }
      .btn.icon { width: 36px; min-width: 36px; padding: 0; }
      .btn:disabled { opacity: 0.42; pointer-events: none; }

      /* ── Two-column layout ── */
      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
        gap: 16px;
        align-items: start;
      }

      /* ── Card ── */
      .card {
        border: 1px solid rgba(220, 229, 224, 0.9);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.93);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .panel { padding: 18px; }

      /* ── Section headers ── */
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 13px;
      }

      .section-head h2 { font-size: 1rem; font-weight: 800; }
      .hint { font-size: 0.81rem; color: var(--muted); margin-top: 2px; }

      /* ── Settings grid ── */
      .settings {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }

      .field > label {
        display: block;
        font-size: 0.77rem;
        font-weight: 700;
        color: #46534e;
        margin-bottom: 5px;
        letter-spacing: 0.01em;
        text-transform: uppercase;
      }

      .field input[type="number"],
      .field input[type="time"] {
        width: 100%;
        min-height: 38px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 7px 10px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .field input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
      }

      .field input:disabled { color: #8b9692; background: #f2f4f3; }

      /* ── Mode toggle ── */
      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        min-height: 38px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: #edf3ef;
        padding: 3px;
      }

      .mode-toggle button {
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #546059;
        font-weight: 700;
        font-size: 0.87rem;
        transition: background 0.13s, color 0.13s, box-shadow 0.13s;
      }

      .mode-toggle button.active {
        background: #fff;
        color: var(--green-dark);
        box-shadow: 0 2px 8px rgba(19, 71, 53, 0.1);
      }

      /* ── Subject cards ── */
      .subject-list { display: grid; gap: 10px; }

      .subject-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--wash);
        overflow: hidden;
        transition: box-shadow 0.15s;
      }

      .subject-card:focus-within { box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.22); }

      .subject-main {
        display: grid;
        grid-template-columns: minmax(150px, 1.6fr) minmax(95px, 0.65fr) auto;
        gap: 9px;
        align-items: end;
        padding: 12px 12px 10px;
      }

      .subject-main .field > label {
        text-transform: none;
        letter-spacing: 0;
      }

      .subject-main input {
        width: 100%;
        min-height: 36px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 7px 10px;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .subject-main input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
      }

      .subject-btns { display: flex; gap: 5px; align-items: flex-end; }

      /* ── Subject time preview ── */
      .subject-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 16px;
        padding: 7px 12px 10px;
        border-top: 1px dashed #dce5e0;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .preview-chip {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .preview-chip .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .preview-chip .times {
        font-family: "Roboto Mono", Consolas, monospace;
        color: var(--green-dark);
        font-size: 0.82rem;
        font-weight: 700;
      }

      /* ── Concessions ── */
      .concessions {
        border-top: 1px solid #e0eae5;
        padding: 10px 12px 12px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 9px;
      }

      .con-card {
        border: 1px solid #dce5e0;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.65);
        padding: 9px;
        transition: border-color 0.13s, background 0.13s;
      }

      .con-card.active {
        border-color: rgba(15, 118, 110, 0.35);
        background: rgba(240, 253, 250, 0.75);
      }

      .check-row {
        display: flex;
        align-items: center;
        gap: 7px;
        min-height: 32px;
      }

      .check-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--green);
        flex-shrink: 0;
      }

      .check-row span { font-size: 0.87rem; font-weight: 700; }

      .con-inputs { margin-top: 7px; display: grid; gap: 5px; }

      .con-inputs label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: #46534e;
        margin-bottom: 3px;
      }

      .con-inputs input {
        width: 100%;
        min-height: 32px;
        border: 1px solid #cfdad4;
        border-radius: 5px;
        background: #fff;
        color: var(--ink);
        padding: 5px 8px;
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .con-inputs input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
      }

      .con-inputs input:disabled { color: #8b9692; background: #f2f4f3; }

      .con-extra {
        font-size: 0.74rem;
        color: var(--muted);
        margin-top: 3px;
        min-height: 1em;
        font-family: "Roboto Mono", Consolas, monospace;
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        align-items: center;
        min-height: 24px;
        margin-top: 12px;
      }

      #toast {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--green-dark);
      }

      #saveIndicator {
        margin-left: auto;
        font-size: 0.76rem;
        color: var(--muted);
        opacity: 0;
        transition: opacity 0.4s;
      }

      #saveIndicator.show { opacity: 1; }

      /* ── Board ── */
      .board { overflow: hidden; }

      .board-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 18px 14px;
        border-bottom: 1px solid var(--line);
      }

      .board-head h2 {
        font-size: 1.2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 99px;
        background: #e0ece6;
        color: var(--green-dark);
        font-size: 0.76rem;
        font-weight: 800;
      }

      .board-summary { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

      .board-list { display: grid; }

      /* ── Event rows ── */
      .event {
        display: grid;
        grid-template-columns: 70px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        padding: 11px 18px;
        border-bottom: 1px solid #edf0ee;
        border-left: 3px solid transparent;
      }

      .event:last-child { border-bottom: 0; }

      .event[data-type="Reading"] { border-left-color: var(--reading-border); background: var(--reading-bg); }
      .event[data-type="Start"]   { border-left-color: var(--start-border);   background: var(--start-bg); }
      .event[data-type="Halfway"] { border-left-color: var(--halfway-border); background: var(--halfway-bg); }
      .event[data-type="Warning"] { border-left-color: var(--warning-border); background: var(--warning-bg); }
      .event[data-type="End"]     { border-left-color: var(--end-border);     background: var(--end-bg); }

      .etime {
        font-family: "Roboto Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 1rem;
        font-weight: 900;
        color: var(--green-dark);
        padding-top: 1px;
      }

      .edesc { font-size: 0.94rem; line-height: 1.4; }

      .tag {
        display: inline-flex;
        align-items: center;
        margin-left: 7px;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.72rem;
        font-weight: 800;
        vertical-align: middle;
      }

      .tag[data-type="Reading"] { background: #dbeafe; color: var(--reading-fg); }
      .tag[data-type="Start"]   { background: #bbf7d0; color: var(--start-fg); }
      .tag[data-type="Halfway"] { background: #fef08a; color: var(--halfway-fg); }
      .tag[data-type="Warning"] { background: #fed7aa; color: var(--warning-fg); }
      .tag[data-type="End"]     { background: #fecdd3; color: var(--end-fg); }

      /* ── Empty state ── */
      .empty {
        padding: 44px 18px;
        text-align: center;
        color: var(--muted);
      }

      .empty svg {
        width: 36px;
        height: 36px;
        opacity: 0.3;
        margin-bottom: 10px;
      }

      .empty p { font-size: 0.88rem; }

      /* ── SVG base ── */
      svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        vertical-align: middle;
      }

      /* ── Print-only header ── */
      .print-header { display: none; }

      /* ── Responsive ── */
      @media (max-width: 1000px) {
        .layout { grid-template-columns: 1fr; }
        .settings { grid-template-columns: repeat(2, 1fr); }
        .concessions { grid-template-columns: 1fr 1fr; }
      }

      @media (max-width: 640px) {
        .shell { padding-top: 14px; }
        .session-fields { flex-direction: column; }
        #sessionDate { flex: 1 1 auto; }
        .subject-main { grid-template-columns: 1fr auto; }
        .subject-main .field:first-child { grid-column: 1 / -1; }
        .settings { grid-template-columns: 1fr 1fr; }
        .concessions { grid-template-columns: 1fr; }
        .event { padding: 10px 14px; }
      }

      /* ── Print ── */
      @media print {
        body { background: #fff !important; }

        .shell { width: 100%; padding: 0; }

        .topbar, .panel { display: none !important; }

        .layout { display: block; }

        .board {
          border: 0;
          box-shadow: none;
          background: #fff;
        }

        .board-head {
          padding: 0 0 10px;
          border-bottom: 2px solid #000;
        }

        .print-header {
          display: block;
          padding-bottom: 14px;
          margin-bottom: 12px;
          border-bottom: 1px solid #bbb;
        }

        .print-header h2 {
          font-size: 1.15rem;
          font-weight: 800;
          margin-bottom: 2px;
        }

        .print-header p {
          font-size: 0.85rem;
          color: #555;
        }

        .event {
          padding: 8px 0;
          border-left: 0 !important;
          background: transparent !important;
          border-bottom: 1px dotted #ddd !important;
        }

        .event:last-child { border-bottom: 0 !important; }

        .etime { font-size: 0.95rem; }

        .tag {
          border: 1px solid #999;
          background: transparent !important;
          color: #333 !important;
        }

        .board-list { padding: 0; }
        .badge { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="shell">

      <!-- Print-only header, populated by JS -->
      <div class="print-header" id="printHeader"></div>

      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" style="width:22px;height:22px">
              <path d="M8 2v4"/><path d="M16 2v4"/><path d="M4 10h16"/>
              <path d="M6 4h12a2 2 0 0 1 2 2v14H4V6a2 2 0 0 1 2-2Z"/>
              <path d="m8 15 2 2 5-5"/>
            </svg>
          </div>
          <div class="brand-text">
            <h1>Time Board</h1>
            <p>Exam Invigilation Calculator</p>
          </div>
        </div>

        <div class="session-fields">
          <input id="sessionTitle" type="text"
            placeholder="Session title  (e.g. Grade 12 – Morning Session)" />
          <input id="sessionDate" type="date" title="Exam date" />
        </div>

        <div class="topbar-actions">
          <a class="btn ghost" href="./index.html" title="Back to Admin">
            <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            Admin
          </a>
          <button class="btn ghost" id="resetBtn" title="Clear everything and start fresh">
            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
          <button class="btn secondary" id="copyBtn" title="Copy board times to clipboard">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn primary" id="printBtn" title="Print board">
            <svg viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
            Print
          </button>
        </div>
      </header>

      <div class="layout">

        <!-- Setup panel -->
        <section class="card panel" aria-labelledby="setupTitle">
          <div class="section-head">
            <div>
              <h2 id="setupTitle">Exam Setup</h2>
              <div class="hint">Set timing mode, reading minutes, and session time.</div>
            </div>
          </div>

          <div class="settings">
            <div class="field">
              <label>Calculate from</label>
              <div class="mode-toggle" role="group" aria-label="Calculate from">
                <button class="active" id="modeStart" type="button">Start</button>
                <button id="modeEnd" type="button">End</button>
              </div>
            </div>
            <div class="field">
              <label for="readingTime">Reading time (min)</label>
              <input id="readingTime" type="number" min="0" max="60" step="1" value="10" />
            </div>
            <div class="field">
              <label for="sessionTime" id="sessionTimeLabel">Session start time</label>
              <input id="sessionTime" type="time" value="13:00" />
            </div>
            <div class="field">
              <label for="defaultExtra">Default concession (min/hr)</label>
              <input id="defaultExtra" type="number" min="0" max="120" step="1" value="10" />
            </div>
          </div>

          <div class="section-head">
            <h2>Subjects</h2>
            <button class="btn secondary" id="addSubject" type="button">
              <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
              Add Subject
            </button>
          </div>

          <div class="subject-list" id="subjectList"></div>

          <div class="status-bar">
            <div id="toast" role="status" aria-live="polite"></div>
            <div id="saveIndicator">&#10003; Saved</div>
          </div>
        </section>

        <!-- Board -->
        <section class="card board" aria-labelledby="boardTitle">
          <div class="board-head">
            <div>
              <h2 id="boardTitle">
                Board Times
                <span class="badge" id="eventCount">0</span>
              </h2>
              <div class="board-summary" id="summary"></div>
            </div>
          </div>
          <div class="board-list" id="boardList"></div>
        </section>

      </div>
    </main>

    <script>
      // ── Storage ──────────────────────────────────────────────────────────────
      const STORAGE_KEY = "examTimeBoard_v2";

      const DEFAULT_STATE = {
        sessionTitle: "",
        sessionDate: "",
        calculationMode: "start",
        readingTime: 10,
        sessionStart: "13:00",
        finalEnd: "12:00",
        defaultExtra: 10,
        subjects: [
          {
            name: "Accounting",
            duration: 120,
            concessions: [
              { enabled: true,  label: "Concession 1", concessionPerHour: 10 },
              { enabled: false, label: "Concession 2", concessionPerHour: 10 },
              { enabled: false, label: "Concession 3", concessionPerHour: 10 },
            ],
          },
          {
            name: "Geography",
            duration: 180,
            concessions: [
              { enabled: true,  label: "Concession 1", concessionPerHour: 10 },
              { enabled: false, label: "Concession 2", concessionPerHour: 10 },
              { enabled: false, label: "Concession 3", concessionPerHour: 10 },
            ],
          },
        ],
      };

      function loadPersistedState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {}
        return null;
      }

      let saveTimer;
      function queueSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
          const ind = document.getElementById("saveIndicator");
          ind.classList.add("show");
          clearTimeout(queueSave._hideTimer);
          queueSave._hideTimer = setTimeout(() => ind.classList.remove("show"), 1800);
        }, 500);
      }

      // ── State ────────────────────────────────────────────────────────────────
      const persisted = loadPersistedState();
      const state = persisted
        ? { ...DEFAULT_STATE, ...persisted }
        : JSON.parse(JSON.stringify(DEFAULT_STATE));

      // ── Element refs ─────────────────────────────────────────────────────────
      const els = {
        readingTime:      document.querySelector("#readingTime"),
        sessionTime:      document.querySelector("#sessionTime"),
        sessionTimeLabel: document.querySelector("#sessionTimeLabel"),
        sessionTitle:     document.querySelector("#sessionTitle"),
        sessionDate:      document.querySelector("#sessionDate"),
        modeStart:        document.querySelector("#modeStart"),
        modeEnd:          document.querySelector("#modeEnd"),
        defaultExtra:     document.querySelector("#defaultExtra"),
        subjectList:      document.querySelector("#subjectList"),
        boardList:        document.querySelector("#boardList"),
        summary:          document.querySelector("#summary"),
        eventCount:       document.querySelector("#eventCount"),
        toast:            document.querySelector("#toast"),
        addSubject:       document.querySelector("#addSubject"),
        copyBtn:          document.querySelector("#copyBtn"),
        printBtn:         document.querySelector("#printBtn"),
        resetBtn:         document.querySelector("#resetBtn"),
        printHeader:      document.querySelector("#printHeader"),
      };

      // ── Time helpers ─────────────────────────────────────────────────────────
      function timeToMinutes(t) {
        const [h, m] = t.split(":").map(Number);
        return h * 60 + m;
      }

      function minutesToTime(total) {
        const day = 1440;
        const n = ((total % day) + day) % day;
        return `${String(Math.floor(n / 60)).padStart(2, "0")}:${String(n % 60).padStart(2, "0")}`;
      }

      function formatDateLong(dateStr) {
        if (!dateStr) return "";
        try {
          return new Date(dateStr + "T00:00:00").toLocaleDateString("en-ZA", {
            weekday: "long", year: "numeric", month: "long", day: "numeric",
          });
        } catch { return dateStr; }
      }

      function cleanNumber(val, fallback = 0) {
        const n = Number(val);
        return Number.isFinite(n) ? Math.max(0, n) : fallback;
      }

      // ── Concession helpers ───────────────────────────────────────────────────
      function defaultConcessions() {
        return [
          { enabled: false, label: "Concession 1", concessionPerHour: state.defaultExtra },
          { enabled: false, label: "Concession 2", concessionPerHour: state.defaultExtra },
          { enabled: false, label: "Concession 3", concessionPerHour: state.defaultExtra },
        ];
      }

      function ensureConcessions(subject) {
        if (!Array.isArray(subject.concessions)) {
          subject.concessions = [
            {
              enabled: Boolean(subject.concession),
              label: "Concession 1",
              concessionPerHour: cleanNumber(subject.concessionPerHour, state.defaultExtra),
            },
          ];
        }
        while (subject.concessions.length < 3) {
          subject.concessions.push({
            enabled: false,
            label: `Concession ${subject.concessions.length + 1}`,
            concessionPerHour: state.defaultExtra,
          });
        }
        subject.concessions = subject.concessions.slice(0, 3).map((c, i) => ({
          enabled: Boolean(c.enabled),
          label: c.label || `Concession ${i + 1}`,
          concessionPerHour: cleanNumber(c.concessionPerHour, state.defaultExtra),
        }));
        return subject.concessions;
      }

      // extra minutes for a given duration and rate
      function calcExtra(duration, ratePerHour) {
        return Math.ceil(cleanNumber(duration, 0) / 60) * cleanNumber(ratePerHour, 0);
      }

      // ── Schedule generation ───────────────────────────────────────────────────
      function addExamEvents(events, label, duration, extraPerHour) {
        const base = timeToMinutes(
          state.calculationMode === "start" ? state.sessionStart : state.finalEnd
        );
        const writingDur = cleanNumber(duration, 0);
        const extra = calcExtra(writingDur, extraPerHour);
        const totalWriting = writingDur + extra;
        const readingDur = cleanNumber(state.readingTime, 0);

        const readingStart =
          state.calculationMode === "start"
            ? base
            : base - totalWriting - readingDur;
        const writingStart = readingStart + readingDur;
        const endTime = writingStart + totalWriting;

        if (readingDur > 0) {
          events.push({ time: readingStart, type: "Reading", label, action: "reading starts" });
        }
        events.push({ time: writingStart, type: "Start", label, action: "writing starts" });
        if (totalWriting > 0) {
          events.push({ time: writingStart + Math.floor(totalWriting / 2), type: "Halfway", label, action: "halfway mark" });
        }
        if (totalWriting > 30) {
          events.push({ time: endTime - 30, type: "Warning", label, action: "30 mins left" });
        }
        events.push({ time: endTime, type: "End", label, action: "ends" });
      }

      function groupedHeading(type) {
        return { Reading: "Reading starts", Start: "Writing starts", Halfway: "Halfway mark", Warning: "30 mins left", End: "Ends" }[type] || "Event";
      }

      function summarizeLabels(labels, action, type) {
        const u = [...new Set(labels)];
        return u.length === 1 ? `${u[0]} ${action}` : `${groupedHeading(type)}: ${u.join(", ")}`;
      }

      function generateSchedule() {
        const events = [];
        state.subjects.forEach((subject) => {
          const name = subject.name.trim() || "Unnamed subject";
          const dur = cleanNumber(subject.duration, 0);
          addExamEvents(events, `${name} main exam`, dur, 0);
          ensureConcessions(subject)
            .filter((c) => c.enabled)
            .forEach((c) => addExamEvents(events, `${name} ${c.label}`, dur, c.concessionPerHour));
        });

        const grouped = new Map();
        events.forEach((e) => {
          const key = `${e.time}-${e.type}`;
          if (!grouped.has(key)) grouped.set(key, { time: e.time, type: e.type, action: e.action, labels: [] });
          grouped.get(key).labels.push(e.label);
        });

        return [...grouped.values()]
          .map((e) => ({
            time: e.time,
            type: e.type,
            description: summarizeLabels(e.labels, e.action, e.type),
          }))
          .sort((a, b) => a.time - b.time || a.type.localeCompare(b.type) || a.description.localeCompare(b.description));
      }

      // ── Subject time preview ─────────────────────────────────────────────────
      function subjectPreviewHTML(subject) {
        const base = timeToMinutes(
          state.calculationMode === "start" ? state.sessionStart : state.finalEnd
        );
        const dur = cleanNumber(subject.duration, 0);
        const readingDur = cleanNumber(state.readingTime, 0);
        const readingStart =
          state.calculationMode === "start" ? base : base - dur - readingDur;
        const writingStart = readingStart + readingDur;
        const mainEnd = writingStart + dur;

        const DOT_COLORS = { main: "#16a34a", c1: "#0369a1", c2: "#7c3aed", c3: "#b45309" };

        const chips = [];

        const mainLabel = readingDur > 0
          ? `${minutesToTime(readingStart)} · ${minutesToTime(writingStart)} – ${minutesToTime(mainEnd)}`
          : `${minutesToTime(writingStart)} – ${minutesToTime(mainEnd)}`;
        chips.push(`<span class="preview-chip">
          <span class="dot" style="background:${DOT_COLORS.main}"></span>
          <span>Main</span>
          <span class="times">${mainLabel}</span>
        </span>`);

        const colors = [DOT_COLORS.c1, DOT_COLORS.c2, DOT_COLORS.c3];
        ensureConcessions(subject).forEach((c, i) => {
          if (!c.enabled) return;
          const extra = calcExtra(dur, c.concessionPerHour);
          const conEnd = writingStart + dur + extra;
          chips.push(`<span class="preview-chip">
            <span class="dot" style="background:${colors[i]}"></span>
            <span>${escapeHtml(c.label)}</span>
            <span class="times">+${extra} min → ${minutesToTime(conEnd)}</span>
          </span>`);
        });

        return chips.join("");
      }

      // ── Render: subjects ─────────────────────────────────────────────────────
      function renderSubjects() {
        els.subjectList.innerHTML = "";
        state.subjects.forEach((subject, i) => {
          const concessions = ensureConcessions(subject);
          const card = document.createElement("article");
          card.className = "subject-card";

          card.innerHTML = `
            <div class="subject-main">
              <div class="field">
                <label for="sub-name-${i}">Subject</label>
                <input id="sub-name-${i}" type="text" value="${escapeHtml(subject.name)}" placeholder="Subject name" />
              </div>
              <div class="field">
                <label for="sub-dur-${i}">Duration (min)</label>
                <input id="sub-dur-${i}" type="number" min="0" step="5" value="${subject.duration}" />
              </div>
              <div class="subject-btns">
                <button class="btn icon secondary" data-action="dup" type="button" title="Duplicate subject">
                  <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
                <button class="btn icon danger" data-action="del" type="button" title="Remove subject" ${state.subjects.length === 1 ? "disabled" : ""}>
                  <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6 18 21H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
              </div>
            </div>
            <div class="subject-preview" id="preview-${i}"></div>
            <div class="concessions">
              ${concessions.map((c, ci) => `
                <div class="con-card ${c.enabled ? "active" : ""}" id="concard-${i}-${ci}">
                  <div class="check-row">
                    <input id="con-chk-${i}-${ci}" type="checkbox" ${c.enabled ? "checked" : ""} />
                    <span>${escapeHtml(c.label)}</span>
                  </div>
                  <div class="con-inputs" id="coninputs-${i}-${ci}" style="${c.enabled ? "" : "opacity:.5"}">
                    <div>
                      <label for="con-rate-${i}-${ci}">Min/hr</label>
                      <input id="con-rate-${i}-${ci}" type="number" min="0" step="1" value="${c.concessionPerHour}" ${c.enabled ? "" : "disabled"} />
                    </div>
                    <div class="con-extra" id="conextra-${i}-${ci}"></div>
                  </div>
                </div>
              `).join("")}
            </div>
          `;

          // Subject name
          card.querySelector(`#sub-name-${i}`).addEventListener("input", (e) => {
            state.subjects[i].name = e.target.value;
            updatePreview(i);
            renderBoard();
            queueSave();
          });

          // Duration
          card.querySelector(`#sub-dur-${i}`).addEventListener("input", (e) => {
            state.subjects[i].duration = cleanNumber(e.target.value);
            updatePreview(i);
            updateConcessionExtras(i);
            renderBoard();
            queueSave();
          });

          // Duplicate / Delete
          card.querySelector("[data-action='dup']").addEventListener("click", () => duplicateSubject(i));
          card.querySelector("[data-action='del']").addEventListener("click", () => removeSubject(i));

          // Concession checkboxes + rate inputs
          concessions.forEach((c, ci) => {
            card.querySelector(`#con-chk-${i}-${ci}`).addEventListener("change", (e) => {
              state.subjects[i].concessions[ci].enabled = e.target.checked;
              render(); // re-render subjects (disables input, updates card class)
              queueSave();
            });
            card.querySelector(`#con-rate-${i}-${ci}`).addEventListener("input", (e) => {
              state.subjects[i].concessions[ci].concessionPerHour = cleanNumber(e.target.value);
              updatePreview(i);
              updateConcessionExtras(i);
              renderBoard();
              queueSave();
            });
          });

          els.subjectList.append(card);
          updatePreview(i);
          updateConcessionExtras(i);
        });
      }

      function updatePreview(i) {
        const el = document.getElementById(`preview-${i}`);
        if (el) el.innerHTML = subjectPreviewHTML(state.subjects[i]);
      }

      function updateConcessionExtras(i) {
        const subject = state.subjects[i];
        const dur = cleanNumber(subject.duration, 0);
        ensureConcessions(subject).forEach((c, ci) => {
          const el = document.getElementById(`conextra-${i}-${ci}`);
          if (!el) return;
          if (c.enabled && dur > 0 && c.concessionPerHour > 0) {
            const extra = calcExtra(dur, c.concessionPerHour);
            el.textContent = `+${extra} min total`;
          } else {
            el.textContent = "";
          }
        });
      }

      // ── Render: board ────────────────────────────────────────────────────────
      function renderBoard() {
        const schedule = generateSchedule();
        els.boardList.innerHTML = "";
        els.eventCount.textContent = schedule.length;

        // Print header
        const titleStr = state.sessionTitle.trim() || "Exam Invigilation Time Board";
        const dateStr = formatDateLong(state.sessionDate);
        els.printHeader.innerHTML = `<h2>${escapeHtml(titleStr)}</h2>${dateStr ? `<p>${escapeHtml(dateStr)}</p>` : ""}`;
        document.title = titleStr + (dateStr ? ` – ${dateStr}` : "");

        if (!schedule.length) {
          els.boardList.innerHTML = `
            <div class="empty">
              <svg viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><path d="M4 10h16"/>
              <path d="M6 4h12a2 2 0 0 1 2 2v14H4V6a2 2 0 0 1 2-2Z"/></svg>
              <p>Add at least one subject to generate board times.</p>
            </div>`;
          els.summary.textContent = "";
          return;
        }

        const modeText = state.calculationMode === "start" ? "from start" : "from end";
        const first = minutesToTime(schedule[0].time);
        const last = minutesToTime(schedule[schedule.length - 1].time);
        els.summary.textContent = `${state.subjects.length} subject${state.subjects.length === 1 ? "" : "s"} · ${first} – ${last} · ${modeText}`;

        schedule.forEach((event) => {
          const row = document.createElement("div");
          row.className = "event";
          row.dataset.type = event.type;
          row.innerHTML = `
            <div class="etime">${minutesToTime(event.time)}</div>
            <div class="edesc">${escapeHtml(event.description)}<span class="tag" data-type="${event.type}">${event.type}</span></div>
          `;
          els.boardList.append(row);
        });
      }

      // ── Full render ──────────────────────────────────────────────────────────
      function render() {
        els.modeStart.classList.toggle("active", state.calculationMode === "start");
        els.modeEnd.classList.toggle("active", state.calculationMode === "end");
        els.sessionTimeLabel.textContent =
          state.calculationMode === "start" ? "Session start time" : "Final end time";
        els.sessionTime.value =
          state.calculationMode === "start" ? state.sessionStart : state.finalEnd;
        renderSubjects();
        renderBoard();
      }

      // ── Subject actions ──────────────────────────────────────────────────────
      function removeSubject(i) {
        state.subjects.splice(i, 1);
        render();
        queueSave();
      }

      function duplicateSubject(i) {
        const src = state.subjects[i];
        const copy = JSON.parse(JSON.stringify(src));
        copy.name = copy.name ? `${copy.name} (copy)` : "";
        state.subjects.splice(i + 1, 0, copy);
        render();
        queueSave();
        flash("Subject duplicated.");
      }

      // ── Utilities ────────────────────────────────────────────────────────────
      function escapeHtml(v) {
        return String(v)
          .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }

      function flash(msg) {
        els.toast.textContent = msg;
        clearTimeout(flash._t);
        flash._t = setTimeout(() => { els.toast.textContent = ""; }, 2400);
      }

      function scheduleText() {
        const schedule = generateSchedule();
        const title = state.sessionTitle.trim() || "Exam Invigilation Time Board";
        const date = formatDateLong(state.sessionDate);
        const header = [title, date].filter(Boolean).join(" – ");
        const divider = "─".repeat(Math.max(header.length, 28));
        return [header, divider, ...schedule.map((e) => `${minutesToTime(e.time)}  ${e.description}`)].join("\n");
      }

      // ── Event listeners ──────────────────────────────────────────────────────
      els.readingTime.addEventListener("input", (e) => {
        state.readingTime = cleanNumber(e.target.value);
        renderSubjects(); // previews depend on reading time
        renderBoard();
        queueSave();
      });

      els.sessionTime.addEventListener("input", (e) => {
        if (state.calculationMode === "start") state.sessionStart = e.target.value || "13:00";
        else state.finalEnd = e.target.value || "12:00";
        renderSubjects();
        renderBoard();
        queueSave();
      });

      els.modeStart.addEventListener("click", () => {
        state.calculationMode = "start";
        render();
        queueSave();
      });

      els.modeEnd.addEventListener("click", () => {
        state.calculationMode = "end";
        render();
        queueSave();
      });

      els.defaultExtra.addEventListener("input", (e) => {
        state.defaultExtra = cleanNumber(e.target.value, 10);
        queueSave();
      });

      els.sessionTitle.addEventListener("input", (e) => {
        state.sessionTitle = e.target.value;
        renderBoard();
        queueSave();
      });

      els.sessionDate.addEventListener("input", (e) => {
        state.sessionDate = e.target.value;
        renderBoard();
        queueSave();
      });

      els.addSubject.addEventListener("click", () => {
        state.subjects.push({ name: "", duration: 60, concessions: defaultConcessions() });
        render();
        queueSave();
        // Scroll new card into view
        requestAnimationFrame(() => {
          els.subjectList.lastElementChild?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      });

      els.resetBtn.addEventListener("click", () => {
        if (!confirm("Reset everything and start fresh? Your current data will be cleared.")) return;
        Object.assign(state, JSON.parse(JSON.stringify(DEFAULT_STATE)));
        localStorage.removeItem(STORAGE_KEY);
        els.sessionTitle.value = "";
        els.sessionDate.value = "";
        els.readingTime.value = state.readingTime;
        els.defaultExtra.value = state.defaultExtra;
        render();
        flash("Reset to defaults.");
      });

      els.copyBtn.addEventListener("click", async () => {
        const text = scheduleText();
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.append(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
        flash("Board times copied to clipboard.");
      });

      els.printBtn.addEventListener("click", () => window.print());

      // ── Init ─────────────────────────────────────────────────────────────────
      els.sessionTitle.value = state.sessionTitle;
      els.sessionDate.value = state.sessionDate;
      els.readingTime.value = state.readingTime;
      els.defaultExtra.value = state.defaultExtra;

      if (persisted) flash("Session restored from last visit.");

      render();
    </script>
  </body>
</html>
