<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exam Invigilation Time Board</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #16201d;
        --muted: #63706c;
        --line: #dce5e0;
        --paper: #ffffff;
        --wash: #f3f7f4;
        --green: #1c6b4f;
        --green-dark: #114935;
        --teal: #0f766e;
        --amber: #b7791f;
        --red: #b42318;
        --shadow: 0 18px 42px rgba(20, 39, 32, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(233, 242, 236, 0.92), rgba(247, 249, 247, 0.98)),
          url("https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1800&q=80");
        background-attachment: fixed;
        background-position: center;
        background-size: cover;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 44px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 46px;
        height: 46px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid rgba(28, 107, 79, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 22px rgba(19, 71, 53, 0.08);
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2.45rem);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .brand p {
        margin: 5px 0 0;
        color: #44504c;
        font-size: 0.98rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
        gap: 18px;
        align-items: start;
      }

      .panel,
      .board {
        border: 1px solid rgba(220, 229, 224, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      .panel {
        padding: 18px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 16px;
      }

      h2 {
        margin: 0;
        font-size: 1.06rem;
        letter-spacing: 0;
      }

      .hint,
      .summary {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .settings {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .mode-toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        min-height: 42px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: #edf3ef;
        padding: 4px;
      }

      .mode-toggle button {
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #43504b;
        font-weight: 800;
      }

      .mode-toggle button.active {
        background: #fff;
        color: var(--green-dark);
        box-shadow: 0 2px 8px rgba(19, 71, 53, 0.1);
      }

      label {
        display: block;
        color: #394541;
        font-size: 0.82rem;
        font-weight: 700;
        margin-bottom: 7px;
      }

      input[type="text"],
      input[type="number"],
      input[type="time"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid #cfdad4;
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 10px 11px;
        outline: none;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease;
      }

      input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
      }

      input:disabled {
        color: #8b9692;
        background: #f2f4f3;
      }

      .subject-list {
        display: grid;
        gap: 10px;
      }

      .subject {
        display: grid;
        grid-template-columns: minmax(160px, 1.6fr) minmax(110px, 0.72fr) 42px;
        gap: 10px;
        align-items: end;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--wash);
      }

      .concession-options {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        padding-top: 4px;
      }

      .concession-option {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 92px;
        gap: 8px;
        align-items: end;
        border: 1px solid #dce5e0;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.64);
        padding: 10px;
      }

      .check-wrap {
        min-height: 42px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 4px;
        font-size: 0.94rem;
        font-weight: 700;
      }

      input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: var(--green);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 9px 13px;
        background: #fff;
        color: var(--ink);
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
      }

      .btn.primary {
        background: var(--green);
        color: #fff;
      }

      .btn.primary:hover {
        background: var(--green-dark);
      }

      .btn.secondary {
        border-color: #cbd8d2;
      }

      .btn.secondary:hover {
        border-color: var(--teal);
      }

      .btn.icon {
        width: 42px;
        padding: 0;
      }

      .btn.danger {
        color: var(--red);
        border-color: #efd1cd;
        background: #fff;
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .board {
        overflow: hidden;
      }

      .board-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
      }

      .board h2 {
        font-size: 1.35rem;
      }

      .board-list {
        display: grid;
        padding: 8px 18px 18px;
      }

      .event {
        display: grid;
        grid-template-columns: 78px minmax(0, 1fr);
        gap: 14px;
        align-items: start;
        padding: 12px 0;
        border-bottom: 1px solid #e6ece9;
      }

      .event:last-child {
        border-bottom: 0;
      }

      .time {
        color: var(--green-dark);
        font-family: "Roboto Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 1.08rem;
        font-weight: 900;
      }

      .desc {
        min-width: 0;
        font-size: 1.02rem;
        line-height: 1.35;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        margin-left: 8px;
        border-radius: 999px;
        background: #f7ead6;
        color: #7a4b0b;
        padding: 3px 8px;
        font-size: 0.76rem;
        font-weight: 800;
      }

      .empty {
        padding: 32px 18px;
        color: var(--muted);
        text-align: center;
      }

      .toast {
        min-height: 22px;
        margin-top: 14px;
        color: var(--green-dark);
        font-size: 0.9rem;
        font-weight: 800;
      }

      svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @media (max-width: 980px) {
        .layout,
        .settings {
          grid-template-columns: 1fr;
        }

        .subject {
          grid-template-columns: repeat(2, minmax(0, 1fr)) 42px;
        }

        .concession-options {
          grid-template-columns: 1fr;
        }

        .subject-name {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100% - 22px, 1180px);
          padding-top: 16px;
        }

        .topbar,
        .board-head {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          justify-content: stretch;
        }

        .actions .btn {
          flex: 1 1 auto;
        }

        .subject {
          grid-template-columns: 1fr 42px;
        }

        .subject > div:not(.remove-cell) {
          grid-column: 1 / -1;
        }

        .remove-cell {
          grid-column: 2;
          grid-row: 1;
          align-self: start;
        }

        .event {
          grid-template-columns: 66px minmax(0, 1fr);
          gap: 10px;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .shell {
          width: 100%;
          padding: 0;
        }

        .topbar,
        .panel,
        .board-head .actions {
          display: none;
        }

        .layout {
          display: block;
        }

        .board {
          border: 0;
          box-shadow: none;
        }

        .board-head {
          padding: 0 0 12px;
        }

        .board-list {
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <path d="M4 10h16" />
              <path d="M6 4h12a2 2 0 0 1 2 2v14H4V6a2 2 0 0 1 2-2Z" />
              <path d="m8 15 2 2 5-5" />
            </svg>
          </div>
          <div>
            <h1>Exam Invigilation Time Board</h1>
            <p>Build the board times once, then copy or print them for staff.</p>
          </div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="./index.html" title="Back to Admin Portal">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5" />
              <path d="M12 19l-7-7 7-7" />
            </svg>
            Admin
          </a>
          <button class="btn secondary" id="copyBtn" type="button" title="Copy board list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
            Copy
          </button>
          <button class="btn primary" id="printBtn" type="button" title="Print board list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 9V2h12v7" />
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
              <path d="M6 14h12v8H6z" />
            </svg>
            Print
          </button>
        </div>
      </header>

      <div class="layout">
        <section class="panel" aria-labelledby="setupTitle">
          <div class="section-title">
            <div>
              <h2 id="setupTitle">Exam Setup</h2>
              <div class="hint">Choose whether the session is planned from the first reading time or a shared finish.</div>
            </div>
          </div>

          <div class="settings">
            <div>
              <label>Calculate from</label>
              <div class="mode-toggle" role="group" aria-label="Calculate from">
                <button class="active" id="modeStart" type="button">Start</button>
                <button id="modeEnd" type="button">End</button>
              </div>
            </div>
            <div>
              <label for="readingTime">Reading time</label>
              <input id="readingTime" type="number" min="0" max="60" step="1" value="10" />
            </div>
            <div>
              <label for="sessionTime" id="sessionTimeLabel">Session start time</label>
              <input id="sessionTime" type="time" value="13:00" />
            </div>
            <div>
              <label for="defaultExtra">Default concession extra</label>
              <input id="defaultExtra" type="number" min="0" max="60" step="1" value="10" />
            </div>
          </div>

          <div class="section-title">
            <h2>Subjects</h2>
            <button class="btn secondary" id="addSubject" type="button" title="Add subject">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              Add Subject
            </button>
          </div>

          <div class="subject-list" id="subjectList"></div>
          <div class="toast" id="toast" role="status" aria-live="polite"></div>
        </section>

        <section class="board" aria-labelledby="boardTitle">
          <div class="board-head">
            <div>
              <h2 id="boardTitle">Board Times</h2>
              <div class="summary" id="summary"></div>
            </div>
          </div>
          <div class="board-list" id="boardList"></div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        calculationMode: "start",
        readingTime: 10,
        sessionStart: "13:00",
        finalEnd: "12:00",
        defaultExtra: 10,
        subjects: [
          {
            name: "Accounting",
            duration: 120,
            concessions: [
              { enabled: true, label: "Concession 1", concessionPerHour: 10 },
              { enabled: false, label: "Concession 2", concessionPerHour: 15 },
              { enabled: false, label: "Concession 3", concessionPerHour: 20 },
            ],
          },
          {
            name: "Geography",
            duration: 180,
            concessions: [
              { enabled: true, label: "Concession 1", concessionPerHour: 10 },
              { enabled: false, label: "Concession 2", concessionPerHour: 15 },
              { enabled: false, label: "Concession 3", concessionPerHour: 20 },
            ],
          },
        ],
      };

      const els = {
        readingTime: document.querySelector("#readingTime"),
        sessionTime: document.querySelector("#sessionTime"),
        sessionTimeLabel: document.querySelector("#sessionTimeLabel"),
        modeStart: document.querySelector("#modeStart"),
        modeEnd: document.querySelector("#modeEnd"),
        defaultExtra: document.querySelector("#defaultExtra"),
        subjectList: document.querySelector("#subjectList"),
        boardList: document.querySelector("#boardList"),
        summary: document.querySelector("#summary"),
        toast: document.querySelector("#toast"),
        addSubject: document.querySelector("#addSubject"),
        copyBtn: document.querySelector("#copyBtn"),
        printBtn: document.querySelector("#printBtn"),
      };

      function timeToMinutes(time) {
        const [hours, minutes] = time.split(":").map(Number);
        return hours * 60 + minutes;
      }

      function minutesToTime(totalMinutes) {
        const day = 24 * 60;
        const normalized = ((totalMinutes % day) + day) % day;
        const hours = Math.floor(normalized / 60);
        const minutes = normalized % 60;
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
      }

      function cleanNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? Math.max(0, number) : fallback;
      }

      function eventType(description) {
        if (description.includes("reading starts")) return "Reading";
        if (description.includes("writing starts")) return "Start";
        if (description.includes("halfway")) return "Halfway";
        if (description.includes("30 mins left")) return "Warning";
        if (description.includes("ends")) return "End";
        return "";
      }

      function defaultConcessions(enabledFirst = false) {
        return [
          { enabled: enabledFirst, label: "Concession 1", concessionPerHour: state.defaultExtra },
          { enabled: false, label: "Concession 2", concessionPerHour: state.defaultExtra },
          { enabled: false, label: "Concession 3", concessionPerHour: state.defaultExtra },
        ];
      }

      function ensureConcessions(subject) {
        if (!Array.isArray(subject.concessions)) {
          subject.concessions = [
            {
              enabled: Boolean(subject.concession),
              label: "Concession 1",
              concessionPerHour: cleanNumber(subject.concessionPerHour, state.defaultExtra),
            },
          ];
        }

        while (subject.concessions.length < 3) {
          subject.concessions.push({
            enabled: false,
            label: `Concession ${subject.concessions.length + 1}`,
            concessionPerHour: state.defaultExtra,
          });
        }

        subject.concessions = subject.concessions.slice(0, 3).map((concession, index) => ({
          enabled: Boolean(concession.enabled),
          label: concession.label || `Concession ${index + 1}`,
          concessionPerHour: cleanNumber(concession.concessionPerHour, state.defaultExtra),
        }));

        return subject.concessions;
      }

      function addExamEvents(events, subjectName, groupName, duration, extraPerHour) {
        const sessionMinutes = timeToMinutes(
          state.calculationMode === "start" ? state.sessionStart : state.finalEnd
        );
        const writingDuration = cleanNumber(duration, 0);
        const extra = Math.ceil(writingDuration / 60) * cleanNumber(extraPerHour, 0);
        const totalWriting = writingDuration + extra;
        const readingStart =
          state.calculationMode === "start"
            ? sessionMinutes
            : sessionMinutes - totalWriting - cleanNumber(state.readingTime, 0);
        const writingStart = readingStart + cleanNumber(state.readingTime, 0);
        const endMinutes = writingStart + totalWriting;
        const label = `${subjectName} ${groupName}`;

        events.push({ time: readingStart, type: "Reading", label, action: "reading starts" });
        events.push({ time: writingStart, type: "Start", label, action: "writing starts" });
        events.push({ time: writingStart + Math.floor(totalWriting / 2), type: "Halfway", label, action: "halfway mark" });
        events.push({ time: endMinutes - 30, type: "Warning", label, action: "30 mins left" });
        events.push({ time: endMinutes, type: "End", label, action: "ends" });
      }

      function groupedHeading(type) {
        if (type === "Reading") return "Reading starts";
        if (type === "Start") return "Writing starts";
        if (type === "Halfway") return "Halfway mark";
        if (type === "Warning") return "30 mins left";
        if (type === "End") return "Ends";
        return "Event";
      }

      function summarizeLabels(labels, action, type) {
        const uniqueLabels = [...new Set(labels)];
        if (uniqueLabels.length === 1) return `${uniqueLabels[0]} ${action}`;
        return `${groupedHeading(type)}: ${uniqueLabels.join(", ")}`;
      }

      function generateSchedule() {
        const events = [];

        state.subjects.forEach((subject) => {
          const name = subject.name.trim() || "Unnamed subject";
          const duration = cleanNumber(subject.duration, 0);
          addExamEvents(events, name, "main exam", duration, 0);
          ensureConcessions(subject)
            .filter((concession) => concession.enabled)
            .forEach((concession) => {
              addExamEvents(events, name, concession.label, duration, concession.concessionPerHour);
            });
        });

        const grouped = new Map();
        events.forEach((event) => {
          const key = `${event.time}-${event.type}-${event.action}`;
          if (!grouped.has(key)) {
            grouped.set(key, {
              time: event.time,
              type: event.type,
              action: event.action,
              labels: [],
            });
          }
          grouped.get(key).labels.push(event.label);
        });

        return [...grouped.values()]
          .map((event) => ({
            time: event.time,
            type: event.type,
            description: summarizeLabels(event.labels, event.action, event.type),
          }))
          .sort((a, b) => a.time - b.time || a.type.localeCompare(b.type) || a.description.localeCompare(b.description));
      }

      function updateSubject(index, key, value, rerenderSubjects = false) {
        state.subjects[index][key] = value;
        if (rerenderSubjects) {
          render();
        } else {
          renderBoard();
        }
      }

      function updateConcession(subjectIndex, concessionIndex, key, value, rerenderSubjects = false) {
        const concessions = ensureConcessions(state.subjects[subjectIndex]);
        concessions[concessionIndex][key] = value;
        if (rerenderSubjects) {
          render();
        } else {
          renderBoard();
        }
      }

      function removeSubject(index) {
        state.subjects.splice(index, 1);
        render();
      }

      function renderSubjects() {
        els.subjectList.innerHTML = "";

        state.subjects.forEach((subject, index) => {
          const concessions = ensureConcessions(subject);
          const row = document.createElement("article");
          row.className = "subject";
          row.innerHTML = `
            <div class="subject-name">
              <label for="subject-${index}">Subject</label>
              <input id="subject-${index}" type="text" value="${escapeHtml(subject.name)}" placeholder="Subject name" />
            </div>
            <div>
              <label for="duration-${index}">Duration</label>
              <input id="duration-${index}" type="number" min="0" step="5" value="${subject.duration}" />
            </div>
            <div class="remove-cell">
              <button class="btn icon danger" type="button" title="Remove subject" ${state.subjects.length === 1 ? "disabled" : ""}>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 6h18" />
                  <path d="M8 6V4h8v2" />
                  <path d="M19 6 18 21H6L5 6" />
                  <path d="M10 11v6" />
                  <path d="M14 11v6" />
                </svg>
              </button>
            </div>
            <div class="concession-options">
              ${concessions
                .map(
                  (concession, concessionIndex) => `
                    <div class="concession-option">
                      <div>
                        <label>Concession ${concessionIndex + 1}</label>
                        <div class="check-wrap">
                          <input id="concession-${index}-${concessionIndex}" type="checkbox" ${concession.enabled ? "checked" : ""} />
                          <span>Use</span>
                        </div>
                      </div>
                      <div>
                        <label for="extra-${index}-${concessionIndex}">Mins/hr</label>
                        <input id="extra-${index}-${concessionIndex}" type="number" min="0" step="1" value="${concession.concessionPerHour}" ${concession.enabled ? "" : "disabled"} />
                      </div>
                    </div>
                  `
                )
                .join("")}
            </div>
          `;

          row.querySelector(`#subject-${index}`).addEventListener("input", (event) => {
            updateSubject(index, "name", event.target.value);
          });
          row.querySelector(`#duration-${index}`).addEventListener("input", (event) => {
            updateSubject(index, "duration", cleanNumber(event.target.value));
          });
          concessions.forEach((concession, concessionIndex) => {
            row.querySelector(`#concession-${index}-${concessionIndex}`).addEventListener("change", (event) => {
              updateConcession(index, concessionIndex, "enabled", event.target.checked, true);
            });
            row.querySelector(`#extra-${index}-${concessionIndex}`).addEventListener("input", (event) => {
              updateConcession(index, concessionIndex, "concessionPerHour", cleanNumber(event.target.value));
            });
          });
          row.querySelector(".remove-cell button").addEventListener("click", () => removeSubject(index));

          els.subjectList.append(row);
        });
      }

      function renderBoard() {
        const schedule = generateSchedule();
        els.boardList.innerHTML = "";
        const modeText = state.calculationMode === "start" ? "from start time" : "from end time";
        els.summary.textContent = `${schedule.length} board entries for ${state.subjects.length} subject${state.subjects.length === 1 ? "" : "s"} ${modeText}.`;

        if (!schedule.length) {
          els.boardList.innerHTML = '<div class="empty">Add at least one subject to generate board times.</div>';
          return;
        }

        schedule.forEach((event) => {
          const row = document.createElement("div");
          row.className = "event";
          const type = event.type || eventType(event.description);
          row.innerHTML = `
            <div class="time">${minutesToTime(event.time)}</div>
            <div class="desc">${escapeHtml(event.description)}${type ? `<span class="tag">${type}</span>` : ""}</div>
          `;
          els.boardList.append(row);
        });
      }

      function render() {
        els.modeStart.classList.toggle("active", state.calculationMode === "start");
        els.modeEnd.classList.toggle("active", state.calculationMode === "end");
        els.sessionTimeLabel.textContent =
          state.calculationMode === "start" ? "Session start time" : "Final end time";
        els.sessionTime.value =
          state.calculationMode === "start" ? state.sessionStart : state.finalEnd;
        renderSubjects();
        renderBoard();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function scheduleText() {
        return generateSchedule()
          .map((event) => `${minutesToTime(event.time)}  ${event.description}`)
          .join("\n");
      }

      function flash(message) {
        els.toast.textContent = message;
        window.clearTimeout(flash.timer);
        flash.timer = window.setTimeout(() => {
          els.toast.textContent = "";
        }, 2200);
      }

      els.readingTime.addEventListener("input", (event) => {
        state.readingTime = cleanNumber(event.target.value);
        renderBoard();
      });

      els.sessionTime.addEventListener("input", (event) => {
        if (state.calculationMode === "start") {
          state.sessionStart = event.target.value || "13:00";
        } else {
          state.finalEnd = event.target.value || "12:00";
        }
        renderBoard();
      });

      els.modeStart.addEventListener("click", () => {
        state.calculationMode = "start";
        render();
      });

      els.modeEnd.addEventListener("click", () => {
        state.calculationMode = "end";
        render();
      });

      els.defaultExtra.addEventListener("input", (event) => {
        state.defaultExtra = cleanNumber(event.target.value, 10);
      });

      els.addSubject.addEventListener("click", () => {
        state.subjects.push({
          name: "",
          duration: 60,
          concessions: defaultConcessions(false),
        });
        render();
      });

      els.copyBtn.addEventListener("click", async () => {
        const text = scheduleText();
        try {
          await navigator.clipboard.writeText(text);
          flash("Board times copied.");
        } catch {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.append(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
          flash("Board times copied.");
        }
      });

      els.printBtn.addEventListener("click", () => window.print());

      render();
    </script>
  </body>
</html>
